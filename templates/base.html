<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  {% block head %}{% endblock %}
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

  <!-- Google Translate: auto-applies the googtrans cookie on every page -->
  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({ pageLanguage: 'en', autoDisplay: false }, 'google_translate_element');
    }
  </script>
  <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</head>
<body>
  <!-- Shared hidden translate widget — picks up the cookie automatically -->
  <div id="google_translate_element" style="display:none;"></div>

  {% block body %}{% endblock %}

  <!-- Shared language-change logic available on every page -->
  <script>
    function setAppLanguage(code) {
      function setCookie(n, v) {
        document.cookie = n + '=' + v + '; path=/';
        document.cookie = n + '=' + v + '; path=/; domain=.' + window.location.hostname;
      }
      if (code === 'en') {
        document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/';
        document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/; domain=.' + window.location.hostname;
      } else {
        setCookie('googtrans', '/en/' + code);
      }
      window.location.reload();
    }

    // Restore any <select data-lang-selector> on this page to the saved cookie value
    (function restoreAllSelectors() {
      const match = document.cookie.match(/googtrans=\/en\/([^;]+)/);
      const code = match ? match[1] : 'en';
      document.querySelectorAll('[data-lang-selector]').forEach(sel => {
        for (let i = 0; i < sel.options.length; i++) {
          if (sel.options[i].getAttribute('data-translate') === code) {
            sel.selectedIndex = i;
            break;
          }
        }
        sel.addEventListener('change', function() {
          const chosen = this.options[this.selectedIndex].getAttribute('data-translate');
          setAppLanguage(chosen);
        });
      });
    })();
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
